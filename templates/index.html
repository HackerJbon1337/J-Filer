<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Document Merger</title>
    <meta name="description"
        content="Merge and consolidate PPTX, DOCX, and PDF files into a single document — offline, fast, and beautiful.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>

<body>
    <!-- Animated Background Orbs -->
    <div class="bg-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header" id="app-header">
            <div class="logo-group">
                <div class="logo-icon">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="J-Filer" width="48" height="48"
                        style="mix-blend-mode: screen; object-fit: contain;">
                </div>
                <div>
                    <h1 class="app-title">Document Merger</h1>
                    <p class="app-subtitle">Merge PPTX · DOCX · PDF — Offline</p>
                </div>
            </div>
            <div class="header-badge" id="office-badge" title="Microsoft Office status">
                <span class="badge-dot"></span>
                <span class="badge-text">Checking Office…</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Drop Zone -->
            <section class="glass-card drop-zone-card" id="drop-zone-card">
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-zone-content">
                        <div class="drop-icon-wrapper">
                            <svg class="drop-icon" width="56" height="56" viewBox="0 0 56 56" fill="none">
                                <circle cx="28" cy="28" r="27" stroke="url(#dropG)" stroke-width="1.5"
                                    stroke-dasharray="4 4" opacity="0.5" />
                                <path d="M28 18v20M18 28h20" stroke="url(#dropG)" stroke-width="2.5"
                                    stroke-linecap="round" />
                                <defs>
                                    <linearGradient id="dropG" x1="0" y1="0" x2="56" y2="56">
                                        <stop stop-color="#60a5fa" />
                                        <stop offset="0.5" stop-color="#a78bfa" />
                                        <stop offset="1" stop-color="#f472b6" />
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                        <p class="drop-text">Drag & drop your files here</p>
                        <p class="drop-subtext">or click to browse · PDF, DOCX, PPTX</p>
                    </div>
                    <input type="file" id="file-input" multiple accept=".pdf,.docx,.pptx,.doc,.ppt" hidden>
                </div>
            </section>

            <!-- File List -->
            <section class="glass-card file-list-card" id="file-list-card" style="display:none;">
                <div class="card-header">
                    <h2 class="card-title">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <path d="M3 5h12M3 9h12M3 13h8" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg>
                        Files
                        <span class="file-count" id="file-count">0</span>
                    </h2>
                    <button class="btn-icon" id="clear-all-btn" title="Clear all files">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
                <ul class="file-list" id="file-list"></ul>
            </section>

            <!-- Controls -->
            <section class="glass-card controls-card" id="controls-card" style="display:none;">
                <div class="controls-grid">
                    <div class="control-group">
                        <label class="control-label" for="output-format">Output Format</label>
                        <div class="select-wrapper">
                            <select id="output-format" class="glass-select">
                                <option value="auto">Auto Detect</option>
                                <option value="pdf">PDF</option>
                                <option value="docx">Word (DOCX)</option>
                                <option value="pptx">PowerPoint (PPTX)</option>
                            </select>
                            <svg class="select-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
                                <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </div>
                    </div>
                    <button class="btn-merge" id="merge-btn" disabled>
                        <span class="btn-merge-text">Merge Documents</span>
                        <span class="btn-merge-loading" style="display:none;">
                            <span class="spinner"></span>
                            Merging…
                        </span>
                    </button>
                </div>
            </section>

            <!-- Progress Bar -->
            <section class="glass-card progress-card" id="progress-card" style="display:none;">
                <div class="progress-content">
                    <div class="progress-header">
                        <div class="progress-spinner-wrapper">
                            <svg class="progress-ring" width="48" height="48" viewBox="0 0 48 48">
                                <circle class="progress-ring-bg" cx="24" cy="24" r="20" fill="none"
                                    stroke="rgba(255,255,255,0.06)" stroke-width="3" />
                                <circle class="progress-ring-fill" id="progress-ring-fill" cx="24" cy="24" r="20"
                                    fill="none" stroke="url(#progGrad)" stroke-width="3" stroke-linecap="round"
                                    stroke-dasharray="125.66" stroke-dashoffset="125.66"
                                    transform="rotate(-90 24 24)" />
                                <defs>
                                    <linearGradient id="progGrad" x1="0" y1="0" x2="1" y2="1">
                                        <stop stop-color="#60a5fa" />
                                        <stop offset="1" stop-color="#a78bfa" />
                                    </linearGradient>
                                </defs>
                            </svg>
                            <span class="progress-percent" id="progress-percent">0%</span>
                        </div>
                        <div class="progress-info">
                            <div class="progress-title" id="progress-title">Merging documents…</div>
                            <div class="progress-subtitle" id="progress-subtitle">Preparing files</div>
                        </div>
                    </div>
                    <div class="progress-bar-track">
                        <div class="progress-bar-fill" id="progress-bar-fill"></div>
                    </div>
                </div>
            </section>

            <!-- Status / Result -->
            <section class="glass-card result-card" id="result-card" style="display:none;">
                <div class="result-content" id="result-content"></div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>Universal Document Merger · Offline · Open Source</p>
        </footer>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
